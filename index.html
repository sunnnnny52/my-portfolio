<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio Tracker</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

input,select{
    padding:8px;
    margin:3px;
}

button{
    padding:8px 12px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
}
</style>
</head>

<body>

<h1>Portfolio Tracker</h1>

<div class="card">
<h2>Dashboard</h2>

<p>股票市值: $<span id="stockTotalEl">0</span></p>
<p>活期存款: $<span id="savingTotalEl">0</span></p>
<p>定期存款: $<span id="fixedTotalEl">0</span></p>
<p>負債: $<span id="debtTotalEl">0</span></p>

<h3>淨資產: $<span id="netWorthEl">0</span></h3>
</div>

<div class="card">
<h2>股票（BUY / SELL + PnL）</h2>

<input id="stockSymbol" placeholder="AAPL">
<input id="stockQty" type="number" placeholder="數量">
<input id="stockPrice" type="number" placeholder="價格">

<select id="stockType">
<option value="BUY">BUY</option>
<option value="SELL">SELL</option>
</select>

<button onclick="addStock()">新增交易</button>

<table>
<thead>
<tr>
<th>代號</th>
<th>持倉</th>
<th>平均成本</th>
<th>現價</th>
<th>PnL</th>
</tr>
</thead>
<tbody id="stockTable"></tbody>
</table>
</div>

<div class="card">
<h2>活期存款</h2>

<input id="savingName" placeholder="戶口">
<input id="savingAmount" type="number" placeholder="金額">

<button onclick="addSaving()">新增</button>

<table>
<thead>
<tr>
<th>戶口</th>
<th>金額</th>
</tr>
</thead>
<tbody id="savingTable"></tbody>
</table>
</div>

<div class="card">
<h2>定期存款</h2>

<input id="fixedBank" placeholder="銀行">
<input id="fixedAmount" type="number" placeholder="金額">
<input id="fixedRate" type="number" placeholder="利率%">
<input id="fixedDate" type="date">

<button onclick="addFixed()">新增</button>

<table>
<thead>
<tr>
<th>銀行</th>
<th>金額</th>
<th>利率</th>
<th>到期日</th>
</tr>
</thead>
<tbody id="fixedTable"></tbody>
</table>
</div>

<div class="card">
<h2>負債</h2>

<input id="debtName" placeholder="名稱">
<input id="debtAmount" type="number" placeholder="金額">

<button onclick="addDebt()">新增</button>

<table>
<thead>
<tr>
<th>名稱</th>
<th>金額</th>
</tr>
</thead>
<tbody id="debtTable"></tbody>
</table>
</div>

<script>

/* ================= CONFIG ================= */
const FINNHUB_KEY = "d90ki7hr01qj6urtkte0d90ki7hr01qj6urtkteg";
let priceCache = {};

/* ================= DATA ================= */
let data = JSON.parse(localStorage.getItem("portfolio")) || {
stocks:[],
savings:[],
fixedDeposits:[],
debts:[]
};

function save(){
localStorage.setItem("portfolio", JSON.stringify(data));
render();
}

/* ================= FINNHUB ================= */
async function getPrice(symbol){

if(priceCache[symbol]){
return priceCache[symbol];
}

try{
let res = await fetch(
`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${FINNHUB_KEY}`
);

let d = await res.json();

let price = d.c || 0;
priceCache[symbol] = price;

return price;

}catch(e){
return 0;
}

}

/* ================= STOCK ================= */
function addStock(){

data.stocks.push({
symbol: stockSymbol.value,
type: stockType.value,
qty: Number(stockQty.value),
price: Number(stockPrice.value)
});

save();
}

/* ================= OTHER ================= */
function addSaving(){
data.savings.push({
name: savingName.value,
amount: Number(savingAmount.value)
});
save();
}

function addFixed(){
data.fixedDeposits.push({
bank: fixedBank.value,
amount: Number(fixedAmount.value),
rate: Number(fixedRate.value),
date: fixedDate.value
});
save();
}

function addDebt(){
data.debts.push({
name: debtName.value,
amount: Number(debtAmount.value)
});
save();
}

/* ================= RENDER ================= */
function render(){

let map = {};

data.stocks.forEach(t => {

if(!map[t.symbol]){
map[t.symbol] = {buy:0,sell:0,cost:0};
}

if(t.type==="BUY"){
map[t.symbol].buy += t.qty;
map[t.symbol].cost += t.qty * t.price;
}

if(t.type==="SELL"){
map[t.symbol].sell += t.qty;
}

});

/* STOCK TABLE */
let stockHTML = "";
let stockTotal = 0;

for(let symbol of Object.keys(map)){

let s = map[symbol];

let qty = s.buy - s.sell;

if(qty <= 0) continue;

let avgCost = s.buy ? s.cost / s.buy : 0;

/* 🔥 FIXED PRICE LOGIC */
let price = priceCache[symbol] || avgCost;

let value = qty * price;
let pnl = (price - avgCost) * qty;

stockTotal += value;

let color = pnl >= 0 ? "green" : "red";

stockHTML += `
<tr>
<td>${symbol}</td>
<td>${qty}</td>
<td>${avgCost.toFixed(2)}</td>
<td>${price.toFixed(2)}</td>
<td style="color:${color};font-weight:bold">
${pnl.toFixed(2)}
</td>
</tr>
`;

}

document.getElementById("stockTable").innerHTML = stockHTML;

/* SAVINGS */
let savingHTML = "";
let savingTotal = 0;

data.savings.forEach(s=>{
savingTotal += s.amount;
savingHTML += `<tr><td>${s.name}</td><td>${s.amount}</td></tr>`;
});

document.getElementById("savingTable").innerHTML = savingHTML;

/* FIXED */
let fixedHTML = "";
let fixedTotal = 0;

data.fixedDeposits.forEach(f=>{
fixedTotal += f.amount;
fixedHTML += `
<tr>
<td>${f.bank}</td>
<td>${f.amount}</td>
<td>${f.rate}%</td>
<td>${f.date}</td>
</tr>`;
});

document.getElementById("fixedTable").innerHTML = fixedHTML;

/* DEBT */
let debtHTML = "";
let debtTotal = 0;

data.debts.forEach(d=>{
debtTotal += d.amount;
debtHTML += `<tr><td>${d.name}</td><td>${d.amount}</td></tr>`;
});

document.getElementById("debtTable").innerHTML = debtHTML;

/* DASHBOARD */
document.getElementById("stockTotalEl").textContent = stockTotal.toFixed(2);
document.getElementById("savingTotalEl").textContent = savingTotal.toFixed(2);
document.getElementById("fixedTotalEl").textContent = fixedTotal.toFixed(2);
document.getElementById("debtTotalEl").textContent = debtTotal.toFixed(2);

document.getElementById("netWorthEl").textContent =
(stockTotal + savingTotal + fixedTotal - debtTotal).toFixed(2);

}

/* INIT */
render();

/* AUTO REFRESH PRICE CACHE */
setInterval(() => {
priceCache = {};
render();
}, 30000);

</script>

</body>
</html>
