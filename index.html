<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio Tracker</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

input{
    padding:8px;
    margin:3px;
}

button{
    padding:6px 10px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
}
</style>
</head>

<body>

<h1>Portfolio Tracker</h1>

<div class="card">
<h2>Dashboard</h2>

<p>股票市值: $<span id="stockTotal">0</span></p>
<p>活期存款: $<span id="savingTotal">0</span></p>
<p>定期存款: $<span id="fixedTotal">0</span></p>
<p>負債: $<span id="debtTotal">0</span></p>

<h3>淨資產: $<span id="netWorth">0</span></h3>
</div>

<div class="card">
<h2>股票</h2>

<input id="stockSymbol" placeholder="代號">
<input id="stockQty" type="number" placeholder="數量">
<input id="stockCost" type="number" placeholder="成本價">

<button onclick="addStock()">新增</button>

<table>
<thead>
<tr>
<th>代號</th>
<th>數量</th>
<th>成本價</th>
<th>成本值</th>
<th>操作</th>
</tr>
</thead>
<tbody id="stockTable"></tbody>
</table>
</div>

<div class="card">
<h2>活期存款</h2>

<input id="savingName" placeholder="戶口">
<input id="savingAmount" type="number" placeholder="金額">

<button onclick="addSaving()">新增</button>

<table>
<thead>
<tr>
<th>戶口</th>
<th>金額</th>
<th>操作</th>
</tr>
</thead>
<tbody id="savingTable"></tbody>
</table>
</div>

<div class="card">
<h2>定期存款</h2>

<input id="fixedBank" placeholder="銀行">
<input id="fixedAmount" type="number" placeholder="金額">
<input id="fixedRate" type="number" placeholder="利率%">
<input id="fixedDate" type="date">

<button onclick="addFixed()">新增</button>

<table>
<thead>
<tr>
<th>銀行</th>
<th>金額</th>
<th>利率</th>
<th>到期日</th>
<th>操作</th>
</tr>
</thead>
<tbody id="fixedTable"></tbody>
</table>
</div>

<div class="card">
<h2>負債</h2>

<input id="debtName" placeholder="名稱">
<input id="debtAmount" type="number" placeholder="金額">

<button onclick="addDebt()">新增</button>

<table>
<thead>
<tr>
<th>名稱</th>
<th>金額</th>
<th>操作</th>
</tr>
</thead>
<tbody id="debtTable"></tbody>
</table>
</div>

<script>

let data = JSON.parse(localStorage.getItem("portfolio")) || {
stocks:[],
savings:[],
fixedDeposits:[],
debts:[]
};

function save(){
localStorage.setItem("portfolio", JSON.stringify(data));
render();
}

/* ---------------- STOCK ---------------- */

function addStock(){
data.stocks.push({
symbol: stockSymbol.value,
qty: Number(stockQty.value),
cost: Number(stockCost.value)
});
save();
}

function deleteStock(i){
data.stocks.splice(i,1);
save();
}

/* ---------------- SAVING ---------------- */

function addSaving(){
data.savings.push({
name: savingName.value,
amount: Number(savingAmount.value)
});
save();
}

function deleteSaving(i){
data.savings.splice(i,1);
save();
}

/* ---------------- FIXED ---------------- */

function addFixed(){
data.fixedDeposits.push({
bank: fixedBank.value,
amount: Number(fixedAmount.value),
rate: Number(fixedRate.value),
date: fixedDate.value
});
save();
}

function deleteFixed(i){
data.fixedDeposits.splice(i,1);
save();
}

/* ---------------- DEBT ---------------- */

function addDebt(){
data.debts.push({
name: debtName.value,
amount: Number(debtAmount.value)
});
save();
}

function deleteDebt(i){
data.debts.splice(i,1);
save();
}

/* ---------------- RENDER ---------------- */

function render(){

let stockHTML = "";
let stockTotal = 0;

data.stocks.forEach((s,i)=>{
let value = s.qty * s.cost;
stockTotal += value;

stockHTML += `
<tr>
<td>${s.symbol}</td>
<td>${s.qty}</td>
<td>${s.cost}</td>
<td>${value.toFixed(2)}</td>
<td><button onclick="deleteStock(${i})">Delete</button></td>
</tr>
`;
});

stockTable.innerHTML = stockHTML;


/* savings */
let savingHTML = "";
let savingTotal = 0;

data.savings.forEach((s,i)=>{
savingTotal += s.amount;

savingHTML += `
<tr>
<td>${s.name}</td>
<td>${s.amount}</td>
<td><button onclick="deleteSaving(${i})">Delete</button></td>
</tr>
`;
});

savingTable.innerHTML = savingHTML;

/* fixed */
let fixedHTML = "";
let fixedTotal = 0;

data.fixedDeposits.forEach((f,i)=>{
fixedTotal += f.amount;

fixedHTML += `
<tr>
<td>${f.bank}</td>
<td>${f.amount}</td>
<td>${f.rate}%</td>
<td>${f.date}</td>
<td><button onclick="deleteFixed(${i})">Delete</button></td>
</tr>
`;
});

fixedTable.innerHTML = fixedHTML;

/* debt */
let debtHTML = "";
let debtTotal = 0;

data.debts.forEach((d,i)=>{
debtTotal += d.amount;

debtHTML += `
<tr>
<td>${d.name}</td>
<td>${d.amount}</td>
<td><button onclick="deleteDebt(${i})">Delete</button></td>
</tr>
`;
});

debtTable.innerHTML = debtHTML;

/* dashboard */
stockTotalEl.textContent = stockTotal.toFixed(2);
savingTotalEl.textContent = savingTotal.toFixed(2);
fixedTotalEl.textContent = fixedTotal.toFixed(2);
debtTotalEl.textContent = debtTotal.toFixed(2);

netWorthEl.textContent =
(stockTotal + savingTotal + fixedTotal - debtTotal).toFixed(2);
}

render();

</script>

</body>
</html>
