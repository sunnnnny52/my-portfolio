<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio Tracker</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

input,select{
    padding:8px;
    margin:3px;
}

button{
    padding:8px 12px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
}
</style>
</head>

<body>

<h1>Portfolio Tracker</h1>

<div class="card">
<h2>Dashboard</h2>

<p>股票市值: $<span id="stockTotal">0</span></p>
<p>活期存款: $<span id="savingTotal">0</span></p>
<p>定期存款: $<span id="fixedTotal">0</span></p>
<p>負債: $<span id="debtTotal">0</span></p>

<h3>淨資產: $<span id="netWorth">0</span></h3>
</div>

<div class="card">
<h2>股票交易</h2>

<input id="stockSymbol" placeholder="代號">
<input id="stockQty" type="number" placeholder="數量">
<input id="stockPrice" type="number" placeholder="價格">

<select id="stockType">
<option value="BUY">BUY</option>
<option value="SELL">SELL</option>
</select>

<button onclick="addStock()">新增交易</button>

<table>
<thead>
<tr>
<th>代號</th>
<th>持倉</th>
<th>平均成本</th>
<th>市值</th>
</tr>
</thead>
<tbody id="stockTable"></tbody>
</table>
</div>

<div class="card">
<h2>活期存款</h2>

<input id="savingName" placeholder="戶口">
<input id="savingAmount" type="number" placeholder="金額">

<button onclick="addSaving()">新增</button>

<table>
<thead>
<tr>
<th>戶口</th>
<th>金額</th>
</tr>
</thead>
<tbody id="savingTable"></tbody>
</table>
</div>

<div class="card">
<h2>定期存款</h2>

<input id="fixedBank" placeholder="銀行">
<input id="fixedAmount" type="number" placeholder="金額">
<input id="fixedRate" type="number" placeholder="利率%">
<input id="fixedDate" type="date">

<button onclick="addFixed()">新增</button>

<table>
<thead>
<tr>
<th>銀行</th>
<th>金額</th>
<th>利率</th>
<th>到期日</th>
</tr>
</thead>
<tbody id="fixedTable"></tbody>
</table>
</div>

<div class="card">
<h2>負債</h2>

<input id="debtName" placeholder="名稱">
<input id="debtAmount" type="number" placeholder="金額">

<button onclick="addDebt()">新增</button>

<table>
<thead>
<tr>
<th>名稱</th>
<th>金額</th>
</tr>
</thead>
<tbody id="debtTable"></tbody>
</table>
</div>

<script>

/* ---------------- DATA ---------------- */

let data = JSON.parse(localStorage.getItem("portfolio")) || {
stocks:[],
savings:[],
fixedDeposits:[],
debts:[]
};

function save(){
localStorage.setItem("portfolio", JSON.stringify(data));
render();
}

/* ---------------- STOCK TRADE ---------------- */

function addStock(){

data.stocks.push({
symbol: stockSymbol.value,
type: stockType.value,
qty: Number(stockQty.value),
price: Number(stockPrice.value)
});

save();
}

/* ---------------- SAVINGS ---------------- */

function addSaving(){
data.savings.push({
name: savingName.value,
amount: Number(savingAmount.value)
});
save();
}

/* ---------------- FIXED ---------------- */

function addFixed(){
data.fixedDeposits.push({
bank: fixedBank.value,
amount: Number(fixedAmount.value),
rate: Number(fixedRate.value),
date: fixedDate.value
});
save();
}

/* ---------------- DEBT ---------------- */

function addDebt(){
data.debts.push({
name: debtName.value,
amount: Number(debtAmount.value)
});
save();
}

/* ---------------- RENDER ---------------- */

function render(){

/* STOCK CALC */
let map = {};

data.stocks.forEach(t => {

if(!map[t.symbol]){
map[t.symbol] = {
buyQty:0,
sellQty:0,
cost:0
};
}

if(t.type === "BUY"){
map[t.symbol].buyQty += t.qty;
map[t.symbol].cost += t.qty * t.price;
}

if(t.type === "SELL"){
map[t.symbol].sellQty += t.qty;
}

});

/* STOCK TABLE */
let stockHTML = "";
let stockTotal = 0;

Object.keys(map).forEach(symbol => {

let s = map[symbol];

let qty = s.buyQty - s.sellQty;
let avgCost = s.buyQty ? s.cost / s.buyQty : 0;

let value = qty * avgCost;
stockTotal += value;

stockHTML += `
<tr>
<td>${symbol}</td>
<td>${qty}</td>
<td>${avgCost.toFixed(2)}</td>
<td>${value.toFixed(2)}</td>
</tr>
`;

});

stockTable.innerHTML = stockHTML;

/* SAVINGS */
let savingHTML = "";
let savingTotal = 0;

data.savings.forEach(s=>{
savingTotal += s.amount;

savingHTML += `
<tr>
<td>${s.name}</td>
<td>${s.amount}</td>
</tr>
`;
});

savingTable.innerHTML = savingHTML;

/* FIXED */
let fixedHTML = "";
let fixedTotal = 0;

data.fixedDeposits.forEach(f=>{
fixedTotal += f.amount;

fixedHTML += `
<tr>
<td>${f.bank}</td>
<td>${f.amount}</td>
<td>${f.rate}%</td>
<td>${f.date}</td>
</tr>
`;
});

fixedTable.innerHTML = fixedHTML;

/* DEBT */
let debtHTML = "";
let debtTotal = 0;

data.debts.forEach(d=>{
debtTotal += d.amount;

debtHTML += `
<tr>
<td>${d.name}</td>
<td>${d.amount}</td>
</tr>
`;
});

debtTable.innerHTML = debtHTML;

/* DASHBOARD */
stockTotalEl.textContent = stockTotal.toFixed(2);
savingTotalEl.textContent = savingTotal.toFixed(2);
fixedTotalEl.textContent = fixedTotal.toFixed(2);
debtTotalEl.textContent = debtTotal.toFixed(2);

netWorthEl.textContent =
(stockTotal + savingTotal + fixedTotal - debtTotal).toFixed(2);

}

/* init */
render();

</script>

</body>
</html>
