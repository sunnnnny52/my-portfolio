<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portfolio Tracker</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:20px;
  background:#f5f5f5;
}
.card{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}
input,select,button{
  padding:8px;
  margin:3px;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}
th,td{
  border:1px solid #ddd;
  padding:8px;
}
.profit{color:green;font-weight:bold;}
.loss{color:red;font-weight:bold;}
</style>
</head>

<body>

<h1>Portfolio Tracker</h1>

<div class="card">
<h2>Dashboard</h2>

<p>股票市值: $<span id="stockTotal">0</span></p>
<p>活期存款: $<span id="savingTotal">0</span></p>
<p>定期存款: $<span id="fixedTotal">0</span></p>
<p>負債: $<span id="debtTotal">0</span></p>

<h3>淨資產: $<span id="netWorth">0</span></h3>
</div>

<div class="card">
<h2>股票交易</h2>

<input id="stockSymbol" placeholder="AAPL">
<input id="stockQty" type="number" placeholder="數量">
<input id="stockPrice" type="number" placeholder="價格">

<select id="stockType">
<option value="BUY">BUY</option>
<option value="SELL">SELL</option>
</select>

<button onclick="addStock()">新增交易</button>

<table>
<thead>
<tr>
<th>股票</th>
<th>持倉</th>
<th>平均成本</th>
<th>現價</th>
<th>PnL</th>
<th>市值</th>
</tr>
</thead>
<tbody id="stockTable"></tbody>
</table>
</div>

<div class="card">
<h2>活期存款</h2>

<input id="savingName" placeholder="戶口">
<input id="savingAmount" type="number" placeholder="金額">

<button onclick="addSaving()">新增</button>

<table>
<tbody id="savingTable"></tbody>
</table>
</div>

<div class="card">
<h2>定期存款</h2>

<input id="fixedBank" placeholder="銀行">
<input id="fixedAmount" type="number" placeholder="金額">
<input id="fixedRate" type="number" placeholder="利率">
<input id="fixedDate" type="date">

<button onclick="addFixed()">新增</button>

<table>
<tbody id="fixedTable"></tbody>
</table>
</div>

<div class="card">
<h2>負債</h2>

<input id="debtName" placeholder="名稱">
<input id="debtAmount" type="number" placeholder="金額">

<button onclick="addDebt()">新增</button>

<table>
<tbody id="debtTable"></tbody>
</table>
</div>

<script>

const FINNHUB_KEY = "你的新APIKEY";
let priceCache = {};

async function getPrice(symbol){

  if(priceCache[symbol]){
    return priceCache[symbol];
  }

  try{

    const res = await fetch(
      `https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${FINNHUB_KEY}`
    );

    const data = await res.json();

    const price = data.c || 0;

    priceCache[symbol] = price;

    return price;

  }catch(err){

    console.error(err);

    return 0;
  }
}

let data = JSON.parse(localStorage.getItem("portfolio")) || {
  stocks: [],
  savings: [],
  fixedDeposits: [],
  debts: []
};

let data = JSON.parse(localStorage.getItem("portfolio")) || {
  stocks: [],
  savings: [],
  fixedDeposits: [],
  debts: []
};

function save(){
  localStorage.setItem("portfolio", JSON.stringify(data));
  render();
}

function addStock(){

  const symbol = document.getElementById("stockSymbol").value.trim().toUpperCase();

  if(!symbol) return;

  data.stocks.push({
    symbol: symbol,
    qty: Number(document.getElementById("stockQty").value),
    price: Number(document.getElementById("stockPrice").value),
    type: document.getElementById("stockType").value
  });

  save();
}

function addSaving(){
  data.savings.push({
    name: document.getElementById("savingName").value,
    amount: Number(document.getElementById("savingAmount").value)
  });
  save();
}

function addFixed(){
  data.fixedDeposits.push({
    bank: document.getElementById("fixedBank").value,
    amount: Number(document.getElementById("fixedAmount").value),
    rate: Number(document.getElementById("fixedRate").value),
    date: document.getElementById("fixedDate").value
  });
  save();
}

function addDebt(){
  data.debts.push({
    name: document.getElementById("debtName").value,
    amount: Number(document.getElementById("debtAmount").value)
  });
  save();
}

async function render(){

  let stockHTML = "";
  let stockTotal = 0;

  let positions = {};

  data.stocks.forEach(t=>{

    if(!positions[t.symbol]){
      positions[t.symbol] = {
        buyQty:0,
        sellQty:0,
        cost:0
      };
    }

    if(t.type==="BUY"){
      positions[t.symbol].buyQty += t.qty;
      positions[t.symbol].cost += t.qty * t.price;
    }

    if(t.type==="SELL"){
      positions[t.symbol].sellQty += t.qty;
    }

  });

  for(const symbol of Object.keys(positions)){

    const p = positions[symbol];

    const qty = p.buyQty - p.sellQty;

    if(qty <= 0) return;

    const avgCost = p.cost / p.buyQty;

let currentPrice = await getPrice(symbol);

if(currentPrice === 0){
  currentPrice = avgCost;
}

const value = qty * currentPrice;

const pnl =
  (currentPrice - avgCost) * qty;

stockTotal += value;

stockHTML += `
<tr>
<td>${symbol}</td>
<td>${qty}</td>
<td>${avgCost.toFixed(2)}</td>
<td>${currentPrice.toFixed(2)}</td>
<td class="${pnl >= 0 ? 'profit' : 'loss'}">
${pnl.toFixed(2)}
</td>
<td>${value.toFixed(2)}</td>
</tr>
`;
}

  document.getElementById("stockTable").innerHTML = stockHTML;

  let savingHTML = "";
  let savingTotal = 0;

  data.savings.forEach(s=>{
    savingTotal += s.amount;
    savingHTML += `
      <tr>
        <td>${s.name}</td>
        <td>${s.amount}</td>
      </tr>
    `;
  });

  document.getElementById("savingTable").innerHTML = savingHTML;

  let fixedHTML = "";
  let fixedTotal = 0;

  data.fixedDeposits.forEach(f=>{
    fixedTotal += f.amount;
    fixedHTML += `
      <tr>
        <td>${f.bank}</td>
        <td>${f.amount}</td>
        <td>${f.rate}%</td>
        <td>${f.date}</td>
      </tr>
    `;
  });

  document.getElementById("fixedTable").innerHTML = fixedHTML;

  let debtHTML = "";
  let debtTotal = 0;

  data.debts.forEach(d=>{
    debtTotal += d.amount;
    debtHTML += `
      <tr>
        <td>${d.name}</td>
        <td>${d.amount}</td>
      </tr>
    `;
  });

  document.getElementById("debtTable").innerHTML = debtHTML;

  document.getElementById("stockTotal").textContent = stockTotal.toFixed(2);
  document.getElementById("savingTotal").textContent = savingTotal.toFixed(2);
  document.getElementById("fixedTotal").textContent = fixedTotal.toFixed(2);
  document.getElementById("debtTotal").textContent = debtTotal.toFixed(2);

  document.getElementById("netWorth").textContent =
    (stockTotal + savingTotal + fixedTotal - debtTotal).toFixed(2);
}

render();

setInterval(() => {

  priceCache = {};

  render();

}, 60000);

</script>

</body>
</html>
